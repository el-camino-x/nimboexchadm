<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIMBO EXCHANGE - Home</title>
<link rel="stylesheet" href="style.css">
<style>
  body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    margin: 0;
    padding: 0;
  }

  .home-container {
    text-align: center;
    margin: 50px auto;
    max-width: 900px;
    padding: 0 20px;
  }

  .home-container h1 {
    margin-bottom: 10px;
  }

  .logo-img {
    max-width: 250px;
    border-radius: 15px;
    margin-bottom: 20px;
    cursor: pointer;
    transition: 0.2s;
  }
  .logo-img:hover {
    transform: scale(1.05);
  }

  .home-buttons {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-top: 30px;
  }

  .home-buttons button {
    padding: 20px 10px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #ffd700;
    color: black;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: 0.2s;
    font-weight: bold;
  }

  .home-buttons button:hover {
    background: #d6b500;
  }

  p {
    margin-top: 0;
    margin-bottom: 20px;
    font-size: 16px;
  }
</style>
</head>
<body>

<div class="home-container">
  <!-- Logo klikable -->
  <img src="https://i.postimg.cc/2SXZKpvQ/Desain-tanpa-judul-(8)-Photoroom.png" 
       alt="Logo Nimbo Exchange" 
       class="logo-img"
       onclick="location.href='index.html'">

  <h1>Selamat Datang di NIMBO EXCHANGE</h1>
  <p>Pilih menu yang ingin diakses:</p>

  <div class="home-buttons">
    <button onclick="location.href='form.html'">💰 FORM SALES</button>
    <button onclick="comingSoon()">📋 FORM CASBON</button>
    <button onclick="comingSoon()">📊 HISTORY SALES TRANSACTION</button>
    <button onclick="comingSoon()">🧾 HISTORY CASBON TRANSACTION</button>
    <button onclick="comingSoon()">📈 MONTHLY PROFIT</button>
    <button onclick="comingSoon()">🏦 BALANCE BANK</button>
    <button onclick="comingSoon()">👥 CUSTOMER LISTING</button>
  </div>
</div>

<script>
function comingSoon() {
  alert("Coming Soon 😎");
}
</script>

</body>
</html>
