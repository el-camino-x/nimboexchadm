<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIMBO EXCHANGE - Home</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  padding: 0;
  background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
  color: #fff;
}

.home-container {
  text-align: center;
  max-width: 1000px;
  margin: 60px auto;
  padding: 0 20px;
}

/* Logo */
.logo-img {
  max-width: 200px;
  border-radius: 20px;
  box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
  cursor: pointer;
  transition: transform 0.3s, box-shadow 0.3s;
}
.logo-img:hover {
  transform: scale(1.1);
  box-shadow: 0 12px 30px rgba(255, 215, 0, 0.6);
}

/* Title & subtitle */
h1 {
  font-size: 2.8rem;
  font-weight: 700;
  margin: 25px 0 10px;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.6);
}

p {
  font-size: 1.1rem;
  color: #ccc;
  margin-bottom: 40px;
}

/* Buttons grid */
.home-buttons {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 25px;
  justify-items: center;
}

/* Buttons style */
.home-buttons button {
  background: linear-gradient(145deg, #ffd700, #d6b500);
  border: none;
  border-radius: 15px;
  padding: 18px 25px;
  font-size: 1.05rem;
  font-weight: 600;
  color: #111;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  text-shadow: 0 1px 2px rgba(0,0,0,0.2);
}

/* Hover effect */
.home-buttons button:hover {
  transform: translateY(-5px) scale(1.05);
  background: linear-gradient(145deg, #fff176, #ffd700);
  box-shadow: 0 12px 25px rgba(0,0,0,0.6);
  color: #222;
  text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
}

/* Responsive */
@media(max-width:600px){
  h1 { font-size: 2rem; }
  .home-buttons { gap: 18px; }
  .home-buttons button { font-size: 0.95rem; padding: 15px 20px; }
}
</style>
</head>
<body>

<div class="home-container">
  <img src="https://i.postimg.cc/2SXZKpvQ/Desain-tanpa-judul-(8)-Photoroom.png" 
       alt="Logo Nimbo Exchange" 
       class="logo-img"
       onclick="location.href='index.html'">

  <h1>Selamat Datang di NIMBO EXCHANGE</h1>
  <p>Pilih menu yang ingin diakses:</p>

  <div class="home-buttons">
    <button onclick="location.href='form.html'">💰 FORM SALES</button>
    <button onclick="comingSoon()">📋 FORM CASBON</button>
    <button onclick="comingSoon()">📊 HISTORY SALES TRANSACTION</button>
    <button onclick="comingSoon()">🧾 HISTORY CASBON TRANSACTION</button>
    <button onclick="comingSoon()">📈 MONTHLY PROFIT</button>
    <button onclick="comingSoon()">🏦 BALANCE BANK</button>
    <button onclick="comingSoon()">👥 CUSTOMER LISTING</button>
  </div>
</div>

<script>
function comingSoon() {
  alert("Coming Soon 😎");
}
</script>

</body>
</html>
